{{/* Theme + browser meta */}}
<meta name="theme-color" content="#FFF8ED" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#002E29" media="(prefers-color-scheme: dark)">
<meta name="color-scheme" content="light dark">

{{/* OG supplemental tags */}}
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{ with .Title }}{{ . }}{{ else }}{{ site.Title }}{{ end }}">
<meta property="og:locale" content="en_US">
